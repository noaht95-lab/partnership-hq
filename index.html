<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Partnership HQ · Flair Financials</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚽</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F4F7FA; --surface:#FFFFFF; --surface-2:#E9EFF6;
    --ink:#1D2330; --ink-2:#4E5D72; --ink-3:#8593A6;
    --line:#DCE4EE; --line-2:#C9D4E2;
    --accent:#1F4A75; --accent-soft:#DFE9F4; --accent-ink:#173A5E; --on-accent:#FFFFFF;
    --good:#0E7B55; --good-soft:#DCEEE5;
    --warn:#9A6A1B; --warn-soft:#F4E8D2;
    --risk:#AC4438; --risk-soft:#F6E0DC;
    --info:#33628F; --info-soft:#DFE9F2;
    --brand:#1F4A75; --brand-2:#173A5E; --on-brand:#FFFFFF;
    --shadow:0 1px 2px rgba(23,42,64,.06),0 4px 16px rgba(23,42,64,.08);
    --r:12px;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg:#0C1220; --surface:#131C2C; --surface-2:#1B2739;
      --ink:#E8EDF5; --ink-2:#9FB0C5; --ink-3:#6C7C92;
      --line:#243248; --line-2:#2F4058;
      --accent:#6FA0D6; --accent-soft:#1C3049; --accent-ink:#A9C8EA; --on-accent:#0C1220;
      --good:#3FBF8C; --good-soft:#1B3529;
      --warn:#E0A33E; --warn-soft:#3A2E17;
      --risk:#E07B6F; --risk-soft:#3D211D;
      --info:#7FA7CD; --info-soft:#1D2C3A;
      --brand:#16304F; --brand-2:#122843; --on-brand:#FFFFFF;
      --shadow:0 1px 2px rgba(0,0,0,.3),0 4px 16px rgba(0,0,0,.25);
    }
  }
  :root[data-theme="light"]{
    --bg:#F4F7FA; --surface:#FFFFFF; --surface-2:#E9EFF6;
    --ink:#1D2330; --ink-2:#4E5D72; --ink-3:#8593A6;
    --line:#DCE4EE; --line-2:#C9D4E2;
    --accent:#1F4A75; --accent-soft:#DFE9F4; --accent-ink:#173A5E; --on-accent:#FFFFFF;
    --good:#0E7B55; --good-soft:#DCEEE5;
    --warn:#9A6A1B; --warn-soft:#F4E8D2;
    --risk:#AC4438; --risk-soft:#F6E0DC;
    --info:#33628F; --info-soft:#DFE9F2;
    --brand:#1F4A75; --brand-2:#173A5E; --on-brand:#FFFFFF;
    --shadow:0 1px 2px rgba(23,42,64,.06),0 4px 16px rgba(23,42,64,.08);
  }
  :root[data-theme="dark"]{
    --bg:#0C1220; --surface:#131C2C; --surface-2:#1B2739;
    --ink:#E8EDF5; --ink-2:#9FB0C5; --ink-3:#6C7C92;
    --line:#243248; --line-2:#2F4058;
    --accent:#6FA0D6; --accent-soft:#1C3049; --accent-ink:#A9C8EA; --on-accent:#0C1220;
    --good:#3FBF8C; --good-soft:#1B3529;
    --warn:#E0A33E; --warn-soft:#3A2E17;
    --risk:#E07B6F; --risk-soft:#3D211D;
    --info:#7FA7CD; --info-soft:#1D2C3A;
    --brand:#16304F; --brand-2:#122843; --on-brand:#FFFFFF;
    --shadow:0 1px 2px rgba(0,0,0,.3),0 4px 16px rgba(0,0,0,.25);
  }

  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    background:var(--bg); color:var(--ink);
    font:15px/1.5 "DM Sans",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased; min-height:100vh;
  }
  .display{font-family:"DM Sans",-apple-system,sans-serif;font-weight:800}
  button{font:inherit;color:inherit;background:none;border:none;cursor:pointer;padding:0}
  input,select,textarea{
    font:inherit;color:var(--ink);background:var(--surface);
    border:1px solid var(--line-2);border-radius:8px;padding:7px 10px;width:100%;
  }
  input[type=checkbox]{width:17px;height:17px;flex:none;padding:0;margin:0;accent-color:var(--accent);cursor:pointer}
  input:focus,select:focus,textarea:focus,button:focus-visible,[tabindex]:focus-visible{
    outline:2px solid var(--accent);outline-offset:1px;
  }
  label{display:block;font-size:12px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-2);margin:0 0 4px}
  @media (prefers-reduced-motion: reduce){*,*::before,*::after{transition:none!important;animation:none!important}}

  /* ---------- header ---------- */
  header{
    position:sticky;top:0;z-index:40;background:var(--brand);color:var(--on-brand);
    border-bottom:1px solid var(--brand-2);
    padding:14px clamp(14px,4vw,32px) 0;
  }
  .head-row{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .brand{display:flex;align-items:center;gap:10px}
  .brand img.logo{height:28px;width:auto;display:block}
  .brand h1{font-size:19px;margin:0;letter-spacing:-.01em;color:#fff}
  .brand .tag{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#fff;background:rgba(255,255,255,.14);padding:2px 8px;border-radius:99px}
  .head-actions{margin-left:auto;display:flex;gap:8px;align-items:center}
  .btn{
    display:inline-flex;align-items:center;gap:6px;
    padding:7px 14px;border-radius:8px;font-weight:600;font-size:13.5px;
    border:1px solid var(--line-2);background:var(--surface);transition:background .12s;
  }
  .btn:hover{background:var(--surface-2)}
  .btn.primary{background:var(--accent);color:var(--on-accent);border-color:transparent}
  .btn.primary:hover{filter:brightness(1.06)}
  .btn.ghost{border-color:transparent}
  header .btn{background:transparent;color:#fff;border-color:rgba(255,255,255,.35)}
  header .btn:hover{background:rgba(255,255,255,.12)}
  header .btn.ghost{border-color:transparent}
  header .btn.primary{background:#fff;color:var(--brand);border-color:transparent}
  header .btn.primary:hover{filter:none;background:#E7EEF7}
  nav{display:flex;gap:2px;margin-top:10px;overflow-x:auto}
  nav button{
    padding:9px 14px;font-weight:600;font-size:14px;color:rgba(255,255,255,.72);
    border-bottom:2px solid transparent;border-radius:6px 6px 0 0;white-space:nowrap;
  }
  nav button:hover{color:#fff;background:rgba(255,255,255,.10)}
  nav button[aria-selected="true"]{color:#fff;border-bottom-color:#fff}
  nav .count{font-size:11.5px;font-weight:700;background:rgba(255,255,255,.16);border-radius:99px;padding:1px 7px;margin-left:5px;color:#fff}

  main{padding:20px clamp(14px,4vw,32px) 64px;max-width:1280px;margin:0 auto}
  .view-title{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin:2px 0 16px}
  .view-title h2{font-size:16px;margin:0}
  .view-title .sub{color:var(--ink-2);font-size:13.5px}

  /* ---------- chips / pills ---------- */
  .pill{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:700;letter-spacing:.03em;padding:2px 9px;border-radius:99px;white-space:nowrap}
  .pill .dot{width:7px;height:7px;border-radius:99px;flex:none}
  .stage-Prospect{background:var(--surface-2);color:var(--ink-2)}
  .stage-Contacted{background:var(--info-soft);color:var(--info)}
  .stage-Meeting{background:var(--info-soft);color:var(--info)}
  .stage-Proposal{background:var(--warn-soft);color:var(--warn)}
  .stage-Negotiation{background:var(--warn-soft);color:var(--warn)}
  .stage-Won{background:var(--accent-soft);color:var(--accent-ink)}
  .stage-Lost{background:var(--surface-2);color:var(--ink-3);text-decoration:line-through}
  .prio-High{background:var(--risk-soft);color:var(--risk)}
  .prio-Medium{background:var(--warn-soft);color:var(--warn)}
  .prio-Low{background:var(--surface-2);color:var(--ink-2)}
  .partner-chip{
    display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;
    background:var(--accent-soft);color:var(--accent-ink);border-radius:99px;padding:2px 9px;
    max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  }
  button.partner-chip:hover{filter:brightness(.96)}
  .num{font-variant-numeric:tabular-nums}

  /* ---------- dashboard ---------- */
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px}
  .kpi{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:14px 16px;box-shadow:var(--shadow);border-top:3px solid var(--accent)}
  .kpi .k-label{font-size:12px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-2)}
  .kpi .k-value{font-size:26px;font-weight:700;letter-spacing:-.02em;margin-top:2px;color:var(--accent-ink)}
  .kpi .k-sub{font-size:12.5px;color:var(--ink-2);margin-top:1px}
  .kpi.alert .k-value{color:var(--risk)}
  .dash-grid{display:grid;grid-template-columns:1.15fr .85fr;gap:12px;margin-top:12px}
  @media(max-width:820px){.dash-grid{grid-template-columns:1fr}}
  .panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:16px;box-shadow:var(--shadow)}
  .panel h3{margin:0 0 12px;font-size:13px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-2)}
  .bar-row{display:grid;grid-template-columns:92px 1fr 90px;gap:10px;align-items:center;padding:5px 0}
  .bar-row .b-label{font-size:13px;font-weight:600;color:var(--ink-2)}
  .bar-track{display:block;height:14px;background:var(--surface-2);border-radius:4px;overflow:hidden}
  .bar-fill{display:block;height:100%;background:var(--accent);border-radius:0 4px 4px 0;min-width:2px}
  .bar-row .b-val{font-size:12.5px;color:var(--ink-2);text-align:right}
  .mini-list{display:flex;flex-direction:column}
  .mini-item{display:flex;gap:10px;align-items:center;padding:8px 0;border-bottom:1px solid var(--line)}
  .mini-item:last-child{border-bottom:none}
  .mini-item .grow{flex:1;min-width:0}
  .mini-item .t{font-weight:600;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .mini-item .s{font-size:12.5px;color:var(--ink-2)}
  .empty{color:var(--ink-3);font-size:13.5px;padding:14px 0;text-align:center}

  /* ---------- kanban ---------- */
  .board{display:grid;grid-auto-flow:column;grid-auto-columns:262px;gap:10px;overflow-x:auto;padding-bottom:10px;align-items:start}
  .col{background:var(--surface-2);border-radius:var(--r);padding:8px;min-height:120px}
  .col.drag-over{outline:2px dashed var(--accent);outline-offset:-2px}
  .col-head{display:flex;align-items:center;gap:7px;padding:4px 6px 8px}
  .col-head .c-name{font-size:12.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-2)}
  .col-head .c-count{font-size:11.5px;font-weight:700;background:var(--surface);border-radius:99px;padding:0 7px;color:var(--ink-2)}
  .col-head .c-sum{margin-left:auto;font-size:11.5px;color:var(--ink-3)}
  .card{
    background:var(--surface);border:1px solid var(--line);border-radius:8px;
    padding:10px 12px;margin-bottom:8px;box-shadow:var(--shadow);cursor:grab;
  }
  .card:active{cursor:grabbing}
  .card.dragging{opacity:.45}
  .card .c-brand{font-weight:700;font-size:14.5px;display:flex;justify-content:space-between;gap:8px;align-items:baseline}
  .card .c-value{font-size:13px;color:var(--accent-ink);font-weight:700}
  .card .c-meta{font-size:12.5px;color:var(--ink-2);margin-top:2px}
  .card .c-next{font-size:12.5px;margin-top:7px;padding-top:7px;border-top:1px solid var(--line);color:var(--ink-2)}
  .card .c-next b{color:var(--ink);font-weight:600}
  .card .c-foot{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;align-items:center}
  .due-overdue{color:var(--risk);font-weight:700}
  .due-today{color:var(--warn);font-weight:700}

  /* ---------- partners table ---------- */
  .table-wrap{overflow-x:auto;background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow)}
  table{border-collapse:collapse;width:100%;min-width:760px}
  th{font-size:11.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-2);text-align:left;padding:11px 14px;border-bottom:1px solid var(--line-2)}
  td{padding:11px 14px;border-bottom:1px solid var(--line);font-size:14px;vertical-align:middle}
  tbody tr{cursor:pointer}
  tbody tr:hover{background:var(--surface-2)}
  tbody tr:last-child td{border-bottom:none}
  td.r,th.r{text-align:right}

  /* ---------- weekly ---------- */
  .week-bar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:14px}
  .week-bar .range{font-weight:700;font-size:15px;min-width:150px}
  .overdue-panel{border:1px solid var(--risk);background:var(--risk-soft);border-radius:var(--r);padding:12px 14px;margin-bottom:14px}
  .overdue-panel h3{margin:0 0 6px;font-size:13px;color:var(--risk);letter-spacing:.04em;text-transform:uppercase}
  .day{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);margin-bottom:10px;box-shadow:var(--shadow)}
  .day-head{display:flex;align-items:baseline;gap:8px;padding:10px 14px;border-bottom:1px solid var(--line)}
  .day-head .d-name{font-weight:700;font-size:14px}
  .day-head .d-date{font-size:12.5px;color:var(--ink-3)}
  .day-head.today .d-name{color:var(--accent-ink)}
  .day-head .d-today{font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;background:var(--accent);color:var(--on-accent);border-radius:99px;padding:1px 7px}
  .task{display:flex;align-items:center;gap:10px;padding:9px 14px;border-bottom:1px solid var(--line)}
  .task:last-child{border-bottom:none}
  .task input[type=checkbox]{width:17px;height:17px;flex:none;accent-color:var(--accent);cursor:pointer;margin:0}
  .task .t-title{flex:1;min-width:0;font-size:14px}
  .task.done .t-title{color:var(--ink-3);text-decoration:line-through}
  .task .icon-btn{color:var(--ink-3);font-size:15px;padding:2px 6px;border-radius:6px;flex:none}
  .task .icon-btn:hover{background:var(--surface-2);color:var(--risk)}
  .quick-add{display:grid;grid-template-columns:1fr 150px 170px 110px auto;gap:8px;align-items:end;background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:12px 14px;margin-bottom:14px;box-shadow:var(--shadow)}
  @media(max-width:860px){.quick-add{grid-template-columns:1fr 1fr}.quick-add .qa-title{grid-column:1/-1}}

  /* ---------- modal ---------- */
  .overlay{position:fixed;inset:0;background:rgba(12,25,42,.5);z-index:60;display:flex;align-items:flex-start;justify-content:center;padding:4vh 14px;overflow-y:auto}
  .modal{background:var(--surface);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);width:100%;max-width:640px;padding:22px 24px;margin-bottom:6vh}
  .modal h2{margin:0 0 4px;font-size:18px}
  .modal .m-sub{color:var(--ink-2);font-size:13px;margin-bottom:16px}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .form-grid .full{grid-column:1/-1}
  @media(max-width:560px){.form-grid{grid-template-columns:1fr}}
  .modal-actions{display:flex;gap:8px;margin-top:18px;align-items:center}
  .modal-actions .danger{color:var(--risk);margin-right:auto;font-weight:600;font-size:13.5px}
  .modal-actions .danger:hover{text-decoration:underline}
  .linked-tasks{margin-top:20px;border-top:1px solid var(--line);padding-top:14px}
  .linked-tasks h3{margin:0 0 8px;font-size:13px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-2)}
  .lt-add{display:flex;gap:8px;margin-top:10px}
  .lt-add input[type=date]{max-width:160px}

  /* ---------- sync ---------- */
  .sync-dot{width:9px;height:9px;border-radius:99px;background:rgba(255,255,255,.55);flex:none}
  .sync-dot.ok{background:#5BE3A9}
  .sync-dot.saving{background:#F2C14E;animation:pulse 1s infinite alternate}
  .sync-dot.offline{background:#F08373}
  @keyframes pulse{from{opacity:.4}to{opacity:1}}
  .code-box{
    font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:20px;font-weight:700;letter-spacing:.06em;
    background:var(--surface-2);border:1px dashed var(--line-2);border-radius:10px;padding:14px 16px;
    text-align:center;margin:12px 0;user-select:all;
  }
  .setup-choice{border:1px solid var(--line);border-radius:var(--r);padding:16px;margin-top:12px}
  .setup-choice h3{margin:0 0 4px;font-size:15px}
  .setup-choice p{margin:0 0 12px;color:var(--ink-2);font-size:13.5px}
  .or-rule{display:flex;align-items:center;gap:12px;color:var(--ink-3);font-size:12px;font-weight:700;letter-spacing:.08em;margin:16px 0 4px}
  .or-rule::before,.or-rule::after{content:"";flex:1;height:1px;background:var(--line)}

  .sample-note{display:flex;gap:10px;align-items:center;background:var(--info-soft);color:var(--info);border-radius:var(--r);padding:10px 14px;font-size:13.5px;margin-bottom:16px}
  .sample-note button{font-weight:700;text-decoration:underline;color:inherit}
  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--brand);color:#fff;padding:9px 18px;border-radius:99px;font-size:13.5px;font-weight:600;z-index:80;box-shadow:var(--shadow)}
</style>
</head>
<body>
<header>
  <div class="head-row">
    <div class="brand display">
      <img class="logo" src="https://www.flairfinancials.com/lovable-uploads/bab46ef6-c09a-4390-992c-6f4af736b030.png" alt="Flair Financials logo">
      <h1>Flair&nbsp;Financials</h1>
      <span class="tag">Partnership HQ</span>
    </div>
    <div class="head-actions">
      <button class="btn ghost" data-action="sync-settings" id="syncBtn" title="Sync settings">
        <span class="sync-dot" id="syncDot"></span><span id="syncLabel">Sync</span>
      </button>
      <button class="btn" data-action="export-json" title="Download a backup of all data">Export</button>
      <button class="btn" data-action="import-json" title="Restore from a JSON backup">Import</button>
      <button class="btn" data-action="export-csv" title="Download partnerships as CSV">CSV</button>
      <button class="btn primary" data-action="add-partner">+ Partnership</button>
    </div>
  </div>
  <nav id="nav" role="tablist"></nav>
</header>
<main id="main"></main>
<input type="file" id="importFile" accept="application/json" hidden>

<script>
(function(){
"use strict";
const KEY="partnership-hq-v1";
const STAGES=["Prospect","Contacted","Meeting","Proposal","Negotiation","Won","Lost"];
const ACTIVE=STAGES.slice(0,5);
const PRIOS=["High","Medium","Low"];
const $=s=>document.querySelector(s);
const esc=s=>String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const gbp=new Intl.NumberFormat("en-GB",{style:"currency",currency:"GBP",maximumFractionDigits:0});
const money=v=>gbp.format(+v||0);

/* ---- dates ---- */
const iso=d=>{const x=new Date(d);x.setMinutes(x.getMinutes()-x.getTimezoneOffset());return x.toISOString().slice(0,10)};
const todayIso=()=>iso(new Date());
function startOfWeek(d){const x=new Date(d);const day=(x.getDay()+6)%7;x.setDate(x.getDate()-day);x.setHours(0,0,0,0);return x}
function addDays(d,n){const x=new Date(d);x.setDate(x.getDate()+n);return x}
const DAY_NAMES=["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];
const fmtShort=s=>{const d=new Date(s+"T00:00:00");return d.toLocaleDateString("en-GB",{day:"numeric",month:"short"})};
const fmtRange=(a,b)=>fmtShort(iso(a))+" – "+b.toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"});

/* ---- state ---- */
let state=load();
let tab="dashboard";
let weekOffset=0;
let search="";

function load(){
  try{const raw=localStorage.getItem(KEY);if(raw){const s=JSON.parse(raw);if(s&&Array.isArray(s.partners)&&Array.isArray(s.tasks))return s}}catch(e){}
  return seed();
}
function save(){localStorage.setItem(KEY,JSON.stringify(state));schedulePush()}

function seed(){
  const t=new Date();const mon=startOfWeek(t);
  const P=(brand,sector,contact,role,stage,value,priority,nextAction,offset,notes)=>({
    id:uid(),brand,sector,contact,role,email:"",stage,value,priority,nextAction,
    nextActionDate:iso(addDays(mon,offset)),notes:notes||"",sample:true,createdAt:Date.now(),updatedAt:Date.now()});
  const partners=[
    P("Trading 212","Fintech","Sarah K.","Brand Partnerships Lead","Proposal",15000,"High","Send revised activation proposal",1,"Interested in Pathways Tournament main-stage activation."),

/* ---- sync ---- */
const CODE_KEY="partnership-hq-sync-code";
const API="https://ywwjwrnopgpbjfvdembl.supabase.co/functions/v1/hq/api";
let syncCode=localStorage.getItem(CODE_KEY)||"";
let pendingPush=false,pushTimer=null,lastServerStamp=null;

function setSync(s){
  const dot=$("#syncDot"),label=$("#syncLabel");if(!dot)return;
  dot.className="sync-dot "+(s==="ok"?"ok":s==="saving"?"saving":s==="offline"?"offline":"");
  label.textContent=s==="ok"?"Synced":s==="saving"?"Saving…":s==="offline"?"Offline":"Sync";
  $("#syncBtn").title=s==="offline"?"Can't reach the server — changes are saved on this device and will sync when you're back online":"Sync settings";
}
function genCode(){
  const cs="ABCDEFGHJKMNPQRSTVWXYZ23456789";
  const a=crypto.getRandomValues(new Uint8Array(12));
  let s="";a.forEach(v=>{s+=cs[v%cs.length]});
  return "HQ-"+s.slice(0,4)+"-"+s.slice(4,8)+"-"+s.slice(8,12);
}
function schedulePush(){if(!syncCode)return;pendingPush=true;clearTimeout(pushTimer);pushTimer=setTimeout(()=>push(false),700)}
async function push(keepalive){
  if(!syncCode)return;
  clearTimeout(pushTimer);pendingPush=false;setSync("saving");
  try{
    const r=await fetch(API,{method:"PUT",keepalive:!!keepalive,
      headers:{"content-type":"application/json","x-sync-key":syncCode},
      body:JSON.stringify({data:state})});
    if(!r.ok)throw new Error("push failed");
    const j=await r.json();lastServerStamp=j.updated_at;setSync("ok");
  }catch(e){pendingPush=true;setSync("offline")}
}
async function apiGet(code){
  const r=await fetch(API,{headers:{"x-sync-key":code}});
  if(!r.ok)throw new Error("network");
  return r.json();
}
async function pull(initial){
  if(!syncCode)return;
  try{
    const j=await apiGet(syncCode);
    if(!j.found){if(initial)push(false);setSync("ok");return}
    if(j.updated_at!==lastServerStamp&&!pendingPush){
      state=j.data;if(!state.meta)state.meta={};
      lastServerStamp=j.updated_at;
      localStorage.setItem(KEY,JSON.stringify(state));
      render();
    }
    setSync("ok");
  }catch(e){setSync("offline")}
}
document.addEventListener("visibilitychange",()=>{if(!document.hidden){pendingPush?push(false):pull(false)}});
setInterval(()=>{pendingPush?push(false):pull(false)},60000);
window.addEventListener("beforeunload",()=>{if(pendingPush)push(true)});

function showSetup(){
  closeModal(true);
  const o=document.createElement("div");
  o.className="overlay";o.id="overlay";o.dataset.locked="1";
  o.innerHTML=`<div class="modal" role="dialog" aria-modal="true" aria-label="Set up sync">
    <h2>Sync your tracker</h2>
    <div class="m-sub">Your data is stored online, protected by a sync code. Use the same code on every device to see the same data.</div>
    <div class="setup-choice">
      <h3>First time here?</h3>
      <p>Create a new sync code. Keep it somewhere safe — it's the key to your data.</p>
      <button class="btn primary" data-setup="new">Create my sync code</button>
    </div>
    <div class="or-rule">OR</div>
    <div class="setup-choice">

      <p>Enter your existing sync code to connect this device to the same data.</p>
      <form id="setupConnect" style="display:flex;gap:8px">

    push(false);

  });
  o.querySelector("#setupConnect").addEventListener("submit",async e=>{
    e.preventDefault();

    if(code.length<8){alert("That code looks too short — check it and try again.");return}
    const btn=e.target.querySelector("button");btn.disabled=true;btn.textContent="Connecting…";
    try{
      const j=await apiGet(code);
      if(j.found){
        syncCode=code;localStorage.setItem(CODE_KEY,code);
        state=j.data;if(!state.meta)state.meta={};
        lastServerStamp=j.updated_at;
        localStorage.setItem(KEY,JSON.stringify(state));
        closeModal(true);render();setSync("ok");toast("Connected — your data is here");
      }else if(confirm("No data found for that code. Start a fresh tracker under it?")){
        syncCode=code;localStorage.setItem(CODE_KEY,code);
        push(false);closeModal(true);render();
      }else{btn.disabled=false;btn.textContent="Connect"}
    }catch(err){
      alert("Couldn't reach the server. Check your connection and try again.");
      btn.disabled=false;btn.textContent="Connect";
    }
  });
}

      </form></div>`:""}
    <div class="modal-actions">
      ${p?`<button type="button" class="danger" data-action="delete-partner" data-id="${p.id}">Delete partnership</button>`:""}
      <button type="button" class="btn" data-action="close-modal" style="margin-left:auto">Cancel</button>
      <button type="submit" form="partnerForm" class="btn primary">${p?"Save changes":"Add partnership"}</button>
    </div>
  </div>`;
  document.body.appendChild(overlay);
  overlay.addEventListener("mousedown",e=>{if(e.target===overlay)closeModal()});
  $("#partnerForm").addEventListener("submit",e=>{
    e.preventDefault();
    const f=new FormData(e.target);const idv=f.get("id");
    const data={brand:f.get("brand").trim(),sector:f.get("sector").trim(),contact:f.get("contact").trim(),
      role:f.get("role").trim(),email:f.get("email").trim(),value:+f.get("value")||0,
      stage:f.get("stage"),priority:f.get("priority"),nextAction:f.get("nextAction").trim(),
      nextActionDate:f.get("nextActionDate"),notes:f.get("notes").trim(),updatedAt:Date.now()};
    if(!data.brand)return;
    if(idv){const ex=partner(idv);Object.assign(ex,data);delete ex.sample;toast("Saved "+data.brand)}
    else{state.partners.push(Object.assign({id:uid(),createdAt:Date.now()},data));toast("Added "+data.brand)}
    save();closeModal();render();
  });
  const ltForm=$("#ltAdd");
  if(ltForm)ltForm.addEventListener("submit",e=>{
    e.preventDefault();
    const f=new FormData(e.target);
    state.tasks.push({id:uid(),title:f.get("title").trim(),date:f.get("date"),partnerId:p.id,priority:"Medium",done:false,createdAt:Date.now()});
    save();closeModal();openPartnerModal(p.id);renderNav();
  });
  const first=overlay.querySelector("input[name=brand]");if(first&&!p)first.focus();
}
function closeModal(force){const o=$("#overlay");if(o&&(force||!o.dataset.locked))o.remove()}

/* ---- render ---- */
function render(){
  renderNav();
  const m=$("#main");
  const note=state.meta&&state.meta.sampleNote?`<div class="sample-note"><span>This tracker is pre-loaded with sample data so you can see how it works — edit it, or clear it and start fresh.</span><button data-action="clear-sample">Clear sample data</button><button data-action="keep-sample">Keep</button></div>`:"";
  m.innerHTML=note+(tab==="dashboard"?renderDashboard():tab==="pipeline"?renderPipeline():tab==="partners"?renderPartners():renderWeekly());
  if(tab==="partners"){const sb=$("#searchBox");if(sb){sb.addEventListener("input",e=>{search=e.target.value;render();const nb=$("#searchBox");nb.focus();nb.setSelectionRange(nb.value.length,nb.value.length)})}}
  if(tab==="weekly"){$("#quickAdd").addEventListener("submit",e=>{
    e.preventDefault();const f=new FormData(e.target);
    const title=f.get("title").trim();if(!title)return;
    state.tasks.push({id:uid(),title,date:f.get("date"),partnerId:f.get("partnerId")||null,priority:f.get("priority"),done:false,createdAt:Date.now()});
    save();render();toast("Task added");
  })}
  if(tab==="pipeline")wireDnD();
}

/* ---- drag & drop ---- */
function wireDnD(){
  let dragId=null;
  document.querySelectorAll("[data-card]").forEach(card=>{
    card.addEventListener("dragstart",e=>{dragId=card.dataset.card;card.classList.add("dragging");e.dataTransfer.effectAllowed="move"});
    card.addEventListener("dragend",()=>{card.classList.remove("dragging");dragId=null});
  });
  document.querySelectorAll("[data-col]").forEach(col=>{
    col.addEventListener("dragover",e=>{e.preventDefault();col.classList.add("drag-over")});
    col.addEventListener("dragleave",()=>col.classList.remove("drag-over"));
    col.addEventListener("drop",e=>{
      e.preventDefault();col.classList.remove("drag-over");
      if(!dragId)return;
      const p=partner(dragId);
      if(p&&p.stage!==col.dataset.col){p.stage=col.dataset.col;p.updatedAt=Date.now();delete p.sample;save();render();toast(p.brand+" → "+p.stage)}
    });
  });
}

/* ---- data io ---- */
function download(name,text,type){
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([text],{type}));a.download=name;a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),4000);
}
function exportJson(){download("partnership-hq-backup-"+todayIso()+".json",JSON.stringify(state,null,2),"application/json");toast("Backup downloaded")}
function exportCsv(){
  const q=v=>`"${String(v==null?"":v).replace(/"/g,'""')}"`;
  const head=["Brand","Sector","Contact","Role","Email","Stage","Value (GBP)","Priority","Next action","Next action date","Open tasks","Notes"];
  const rows=state.partners.map(p=>[p.brand,p.sector,p.contact,p.role,p.email,p.stage,p.value||0,p.priority,p.nextAction,p.nextActionDate,tasksFor(p.id).filter(t=>!t.done).length,p.notes].map(q).join(","));
  download("partnerships-"+todayIso()+".csv",[head.map(q).join(",")].concat(rows).join("\n"),"text/csv");
  toast("CSV downloaded");
}
$("#importFile").addEventListener("change",e=>{
  const file=e.target.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=()=>{
    try{
      const s=JSON.parse(r.result);
      if(!s||!Array.isArray(s.partners)||!Array.isArray(s.tasks))throw new Error("bad shape");
      if(!confirm("Replace all current data with this backup? Your current data will be overwritten."))return;
      state=s;if(!state.meta)state.meta={};save();render();toast("Backup restored");
    }catch(err){alert("That file isn't a valid Partnership HQ backup (expected JSON with partners and tasks).")}
    e.target.value="";
  };
  r.readAsText(file);
});

/* ---- global actions ---- */
document.addEventListener("click",e=>{
  const el=e.target.closest("[data-action]");if(!el)return;
  const a=el.dataset.action,id=el.dataset.id;
  if(a==="nav"){tab=el.dataset.tab;render();window.scrollTo(0,0)}
  else if(a==="add-partner"){openPartnerModal(null)}
  else if(a==="open-partner"){e.stopPropagation();closeModal();openPartnerModal(id)}
  else if(a==="close-modal"){closeModal()}
  else if(a==="delete-partner"){
    const p=partner(id);
    if(confirm("Delete "+p.brand+"? Its linked tasks will be unlinked (not deleted).")){
      state.partners=state.partners.filter(x=>x.id!==id);
      state.tasks.forEach(t=>{if(t.partnerId===id)t.partnerId=null});
      save();closeModal();render();toast("Deleted "+p.brand);
    }
  }
  else if(a==="toggle-task"){
    const t=state.tasks.find(x=>x.id===id);if(t){t.done=!t.done;delete t.sample;save();
      if($("#overlay")){const pid=t.partnerId;closeModal();if(pid)openPartnerModal(pid)}
      render()}
  }
  else if(a==="delete-task"){
    const t=state.tasks.find(x=>x.id===id);
    state.tasks=state.tasks.filter(x=>x.id!==id);save();
    if($("#overlay")&&t&&t.partnerId){closeModal();openPartnerModal(t.partnerId)}
    render();
  }
  else if(a==="move-today"){const t=state.tasks.find(x=>x.id===id);if(t){t.date=todayIso();save();render();toast("Moved to today")}}
  else if(a==="week"){weekOffset+=+el.dataset.dir;render()}
  else if(a==="week-today"){weekOffset=0;render()}
  else if(a==="sync-settings"){syncCode?showSyncSettings(false):showSetup()}
  else if(a==="sync-copy"){
    (navigator.clipboard?navigator.clipboard.writeText(syncCode):Promise.reject())
      .then(()=>toast("Code copied"))
      .catch(()=>{const b=$("#codeBox");if(b){const r=document.createRange();r.selectNodeContents(b);const s=getSelection();s.removeAllRanges();s.addRange(r);toast("Press ⌘C to copy")}});
  }
  else if(a==="sync-disconnect"){
    if(confirm("Disconnect this device? Your data stays safely online — you can reconnect anytime with your sync code.")){
      localStorage.removeItem(CODE_KEY);localStorage.removeItem(KEY);location.reload();
    }
  }
  else if(a==="export-json"){exportJson()}
  else if(a==="export-csv"){exportCsv()}
  else if(a==="import-json"){$("#importFile").click()}
  else if(a==="clear-sample"){
    state.partners=state.partners.filter(p=>!p.sample);
    state.tasks=state.tasks.filter(t=>!t.sample);
    state.meta.sampleNote=false;save();render();toast("Sample data cleared");
  }
  else if(a==="keep-sample"){state.meta.sampleNote=false;save();render()}
});
document.addEventListener("keydown",e=>{
  if(e.key==="Escape")closeModal();
  const el=e.target.closest?e.target.closest("[data-action='open-partner'][tabindex]"):null;
  if(e.key==="Enter"&&el&&el.tagName!=="BUTTON"){openPartnerModal(el.dataset.id)}
});

render();
if(!syncCode){showSetup()}else{pull(true)}
})();
</script>
</body>
</html>
